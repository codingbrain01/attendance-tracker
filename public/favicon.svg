<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#1e293b"/>
  <!-- Clock circle -->
  <circle cx="16" cy="16" r="10" stroke="#6366f1" stroke-width="2" fill="#1e293b"/>
  <!-- Clock hour hand (pointing to 12) -->
  <line x1="16" y1="16" x2="16" y2="10" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock minute hand (pointing to ~3) -->
  <line x1="16" y1="16" x2="21" y2="16" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#6366f1"/>
</svg>
